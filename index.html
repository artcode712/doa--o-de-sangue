<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <div class="conteiner">

        <h3>Cadastro</h3>
        <form action="" id="formulario">

            <label for="Nome">Nome completo:</label>
            <input type="text" id="nome" placeholder="Nome">
            <div id="erroNome" class="erro"></div>


            <label for="Email">Email:</label>
            <input type="email" id="email" placeholder="Email">
            <div id="erroEmail" class="erro"></div>


            <label for="Idade">Idade:</label>
            <input type="number" id="idade" placeholder="Idade">
            <div id="erroIdade" class="erro"></div>



            <label for="Peso">Peso:</label>
            <input type="text" id="peso" placeholder="Peso">
            <div id="erroPeso" class="erro"></div>



            <label for="Tipo">Tipo sanguíneo:</label>
            <select name="Tipo" id="tipo">
                <option value="A+"></option>
                <option value="A-"></option>
                <option value="B+"></option>
                <option value="B-"></option>
                <option value="AB+"></option>
                <option value="AB-"></option>
                <option value="O+"></option>
                <option value="O-"></option>
            </select>
            <div id="erroTipo" class="erro"></div>


            <label for="Telefone">Telefone:</label>
            <input type="number" id="telefone" placeholder="Telefone">
            <div id="erroTelefone" class="erro"></div>



            <label for="Cidade">Cidade:</label>
            <input type="text" id="cidade" placeholder="Cidade">
            <div id="erroCidade" class="erro"></div>


            <label for="Estado">Estado:</label>
            <select name="Estado" id="estado">
                <option value=" AC"></option>
                <option value=" AL"></option>
                <option value="AP"></option>
                <option value="AM"></option>
                <option value=" BA"></option>
                <option value=" CE"></option>
                <option value=" DF"></option>
                <option value="ES"></option>
                <option value="GO"></option>
                <option value="MA"></option>
                <option value=" MT"></option>
                <option value="MS"></option>
                <option value="MG"></option>
                <option value="PA"></option>
                <option value="PB"></option>
                <option value=" PR"></option>
                <option value=" PE"></option>
                <option value="PI"></option>
                <option value="RJ"></option>
                <option value="RN"></option>
                <option value="RS"></option>
                <option value="RO"></option>
                <option value="RR"></option>
                <option value=" SC"></option>
                <option value=" SP"></option>
                <option value="SE"></option>
                <option value=" TO "></option>
            </select>
            <div id="erroEstado" class="erro"></div>





            <button type="submit">Enviar</button>

        </form>

        <div class="resultado" id="resultado"></div>

    </div>

    <script src="script.js"></script>



</body>

</html>
